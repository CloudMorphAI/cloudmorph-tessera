id: github-mcp-protection
name: GitHub MCP Protection
description: Block destructive GitHub MCP operations on protected branches or production repos.
  Prevents AI agents from deleting repos, force-pushing, or deleting protected branches.
match:
  upstream: "*"
  tool: "*"
when:
  - condition: tool_name_in
    values:
      - "mcp__github__delete_repo"
      - "mcp__github__force_push"
      - "mcp__github__delete_branch"
  - condition: any_of
    conditions:
      - condition: arg_matches_regex
        arg: branch
        pattern: "^(main|master|prod-[^/]{1,100}|release-[^/]{1,100})$"
      - condition: arg_matches_regex
        arg: repo
        pattern: "^[^/]{0,200}-prod$|^[^/]{0,200}-production$"
action: block
reason: "GitHub destructive operation blocked on protected branch or production repo"
priority: 95
