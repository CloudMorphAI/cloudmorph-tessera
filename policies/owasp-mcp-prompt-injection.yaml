id: owasp-mcp-prompt-injection
name: OWASP MCP Prompt Injection Block
description: Block tool calls whose arguments contain prompt-injection patterns, including instruction override phrases, system prompt mentions, heredoc-style markers, base64 payload smuggling, and the Cursor+Jira _meta field injection vector (August 2025).
match:
  upstream: "*"
  tool: "*"
when:
  - condition: any_of
    conditions:
      - condition: arg_contains_pattern
        arg: "*"
        pattern: "(?i)ignore previous instructions"
      - condition: arg_contains_pattern
        arg: "*"
        pattern: "(?i)system prompt"
      - condition: arg_contains_pattern
        arg: "*"
        pattern: "(?i)override (?:the |your )?safety"
      - condition: arg_contains_pattern
        arg: "*"
        pattern: "(?i)override your"
      - condition: arg_matches_regex
        arg: "*"
        pattern: '<<[^>]{0,50}EOT'
      - condition: arg_matches_regex
        arg: "*"
        pattern: '[A-Za-z0-9+/]{200,}={0,2}'
      - condition: arg_matches_regex
        arg: "*"
        pattern: '_meta\s{0,10}[:=]\s{0,10}\{'
action: block
reason: "Request contains prompt injection patterns"
priority: 95
