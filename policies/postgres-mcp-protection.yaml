id: postgres-mcp-protection
name: Postgres MCP Protection
description: Block Postgres MCP DROP, TRUNCATE, and ALTER operations on critical tables.
  Protects prod_, users, customers, payment_methods, sessions from destructive DDL.
match:
  upstream: "*"
  tool: "*"
when:
  - condition: any_of
    conditions:
      - condition: arg_matches_regex
        arg: query
        pattern: "(?i)\\b(DROP|TRUNCATE|ALTER)\\b\\s{0,30}\\b(TABLE\\s{0,30})?(IF\\s{0,30}EXISTS\\s{0,30})?[\"'`]?(prod_\\w{1,100}|users|customers|payment_methods|sessions)[\"'`]?"
      - condition: arg_matches_regex
        arg: sql
        pattern: "(?i)\\b(DROP|TRUNCATE|ALTER)\\b\\s{0,30}\\b(TABLE\\s{0,30})?(IF\\s{0,30}EXISTS\\s{0,30})?[\"'`]?(prod_\\w{1,100}|users|customers|payment_methods|sessions)[\"'`]?"
action: block
reason: "Postgres DDL operation blocked on critical table"
priority: 96
