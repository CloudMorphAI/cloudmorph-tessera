id: owasp-mcp-tool-poisoning
name: OWASP MCP Tool Poisoning Protection
description: >
  Block MCP tool calls whose name matches known impostor namespaces or typo-squatting
  patterns. Addresses OWASP MCP Top 10 tool poisoning threat where malicious tools
  impersonate legitimate ones by using lookalike provider names (e.g. git_hub, github_official,
  sl4ck, slck, g0thub). See Cursor+Jira 0-Click attack pattern (August 2025).
  Explicit impostor names covered: github_official, git_hub, github_v<N>, slack_app,
  jira_official. Leet-substitution variants covered: g0thub, g1thub, sl4ck, slck,
  jra, jlra.
match:
  upstream: "*"
  tool_pattern: "mcp__(github_official|github_v\\d|git_hub|slack_app|jira_official|g[01]thub|sl4ck|slck|jra|jlra)__"
action: block
reason: "Tool name matches a known impostor or typo-squatting namespace pattern"
priority: 110
