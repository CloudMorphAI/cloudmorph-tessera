name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install cyclonedx-bom==7.3.0
      - run: cyclonedx-py environment -o sbom.json
      - name: Upload SBOM as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

      - name: Upload SBOM as release artifact
        uses: softprops/action-gh-release@v2
        with:
          files: sbom.json

  sign:
    name: Sign Docker image (Sigstore keyless)
    runs-on: ubuntu-latest
    needs: sbom
    permissions:
      contents: read
      packages: write
      id-token: write   # required for keyless OIDC signing
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image (multi-arch)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/cloudmorphai/tessera:${{ steps.version.outputs.VERSION }}
            ghcr.io/cloudmorphai/tessera:latest
          build-args: |
            SOURCE_DATE_EPOCH=${{ github.event.repository.pushed_at }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with cosign (keyless)
        run: |
          cosign sign --yes \
            ghcr.io/cloudmorphai/tessera@${{ steps.build.outputs.digest }}
        env:
          COSIGN_EXPERIMENTAL: "1"

  attest-sbom:
    name: Attest SBOM with cosign
    runs-on: ubuntu-latest
    needs: [sbom, sign]
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Download SBOM artifact
        uses: actions/download-artifact@v4
        with:
          name: sbom
          path: .

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Attest SBOM
        run: |
          cosign attest --yes \
            --predicate sbom.json \
            --type cyclonedx \
            ghcr.io/cloudmorphai/tessera:${{ steps.version.outputs.VERSION }}
        env:
          COSIGN_EXPERIMENTAL: "1"

  pypi-publish:
    name: Publish wheel + sdist to PyPI
    runs-on: ubuntu-latest
    needs: sbom
    permissions:
      id-token: write   # required for PyPI Trusted Publisher (OIDC); no token secret needed
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tooling
        run: pip install --upgrade build

      - name: Build wheel + sdist
        run: |
          python -m build
          ls -la dist/

      - name: Publish to PyPI via Trusted Publisher (OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        # No password needed — Trusted Publisher uses OIDC token from id-token: write above.
        # One-time setup at https://pypi.org/manage/project/cloudmorph-tessera/settings/publishing/
        # Owner: CloudMorphAI · Repo: cloudmorph-tessera · Workflow: release.yml · Environment: (blank)
        # Until configured, this step will fail; founder can twine-upload manually with a token instead.
