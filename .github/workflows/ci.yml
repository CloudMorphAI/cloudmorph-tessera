name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contracts-verify:
    name: contracts · validate · regenerate · diff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for schemaVersion diff
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install codegen tools
        run: |
          pip install datamodel-code-generator
          npm install -g json-schema-to-typescript
      - name: Validate JSON Schemas
        run: |
          pip install check-jsonschema
          for f in contracts/*.schema.json; do
            check-jsonschema --schemafile https://json-schema.org/draft-07/schema "$f"
          done
      - name: Enforce schemaVersion bumps
        run: bash scripts/contracts-version-check.sh
      - name: Generate and verify contracts in sync
        run: make contracts-verify

  lint:
    name: lint · ruff · mypy · eslint · tsc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cloudmorph-mcp/package-lock.json
      - name: Install Python deps
        run: pip install ruff mypy pydantic
      - name: ruff check
        run: ruff check . || true   # informational until codebase is clean
      - name: ruff format check
        run: ruff format --check . || true
      - name: mypy strict (common-py + sdk only for now)
        run: mypy --strict cloudmorph-common-py/ sdk-python/ || true
      - name: tsc --noEmit
        working-directory: cloudmorph-mcp
        run: |
          npm ci || npm install
          npm run lint

  test-py:
    name: test-py · matrix
    strategy:
      fail-fast: false
      matrix:
        python: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install (workspace + deps)
        run: |
          pip install -e sdk-python pytest pytest-cov pydantic
          if [ -d cloudmorph-common-py ]; then pip install -e cloudmorph-common-py || true; fi
      - name: pytest
        run: pytest tests/ sdk-python/tests/ cloudmorph-common-py/tests/ --cov || pytest tests/ sdk-python/tests/ --cov

  test-mcp:
    name: test-mcp · vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cloudmorph-mcp/package-lock.json
      - name: npm install
        working-directory: cloudmorph-mcp
        run: npm ci || npm install
      - name: npm test
        working-directory: cloudmorph-mcp
        run: npm test

  test-rego:
    name: test-rego · opa test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install OPA
        run: |
          curl -L https://openpolicyagent.org/downloads/v0.70.0/opa_linux_amd64_static -o opa
          chmod +x opa
          sudo mv opa /usr/local/bin/
      - name: opa test
        run: |
          if [ -d cloudmorph-mcp/src/policy/rules ]; then
            opa test cloudmorph-mcp/src/policy/rules/ --coverage
          else
            echo "No Rego rules yet — skip"
          fi

  gitleaks:
    name: gitleaks · scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  adversarial:
    name: adversarial · fixtures
    runs-on: ubuntu-latest
    needs: [test-py]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: pytest adversarial
        run: |
          pip install pytest pytest-cov
          if [ -d tests/adversarial ]; then
            pytest tests/adversarial/ -v
          else
            echo "No adversarial fixtures yet — skip (Block H)"
          fi
