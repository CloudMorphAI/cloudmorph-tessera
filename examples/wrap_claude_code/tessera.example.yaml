# tessera.example.yaml — local config for the wrap_claude_code example.
# Copy to tessera.yaml and set TESSERA_BEARER_TOKEN before running.

deployment_id: claude-code-demo

auth:
  type: bearer

policies:
  dir: ./policies
  mode: enforcement
  default_action: allow

upstreams:
  - name: github
    url: http://localhost:5000   # your existing GitHub MCP server
    timeout_seconds: 10

audit:
  path: /tmp/tessera-claude-code-audit.db
  also_stdout: true
