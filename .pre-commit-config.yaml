# Pre-commit hooks for CloudMorph Control Centre.
# Install: `pip install pre-commit && pre-commit install`

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        files: ^(cloudmorph-common-py|sdk-python)/
        args: [--strict, --ignore-missing-imports]
        additional_dependencies:
          - pydantic>=2.0
          - types-requests

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.30.0
    hooks:
      - id: check-jsonschema
        name: validate contracts/*.schema.json shape
        files: ^contracts/.*\.schema\.json$
        args: [--schemafile, https://json-schema.org/draft-07/schema]

  - repo: local
    hooks:
      - id: contracts-version-check
        name: enforce schemaVersion bump on contract changes
        language: script
        entry: scripts/contracts-version-check.sh
        files: ^contracts/.*\.schema\.json$
        pass_filenames: false
