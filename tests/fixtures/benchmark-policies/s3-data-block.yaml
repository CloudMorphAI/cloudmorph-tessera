id: s3-data-block
name: S3 Data — Block canonical aws_s3_* tools
description: |
  Block every canonical aws_s3_* / aws_s3api_* / aws_s3control_* MCP tool
  including aws_s3_ListBuckets — the benchmark's hot-path deny target.

  NOTE: tool_pattern is broader than the production default (which matches
  GetObject/PutObject/etc. only) — for bench-01 we want a guaranteed,
  cheap deny that exercises the full middleware + policy engine + audit
  write paths without any upstream RTT.
priority: 95

match:
  upstream: "*"
  tool_pattern: "^(aws_s3_.+|aws_s3api_.+|aws_s3control_.+)$"

action: block
reason: |
  S3 access via MCP is denied by policy s3-data-block. Benchmark-only
  config — not for production use.
